version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  sqlite_data:
